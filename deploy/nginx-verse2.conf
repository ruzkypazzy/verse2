# Nginx server block for api.verse2.ai (or your subdomain).
# Drop into /etc/nginx/sites-available/verse2 and symlink to sites-enabled.

# HTTP — for certbot challenge. Replace with HTTPS-only after `certbot --nginx`.
server {
    listen 80;
    server_name api.verse2.ai;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Proxy everything else to the verse2 container.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # x402 payments + LLM calls can be slow
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Allow PAYMENT-REQUIRED / X-PAYMENT-RECEIPT to pass through
        proxy_pass_request_headers on;
    }
}
